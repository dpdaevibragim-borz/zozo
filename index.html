<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZOZO App</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #0b0e14;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
        }

        .header {
            text-align: center;
            margin-top: 40px;
        }

        .header h1 {
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: 4px;
            background: linear-gradient(45deg, #ff0055, #00ffcc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 0px 20px rgba(0, 255, 204, 0.2);
        }

        .header p {
            color: #707e94;
            font-size: 0.9rem;
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 400px;
        }

        .status-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 30px;
            width: 100%;
            text-align: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }

        .pulse-orb {
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, #00ffcc 0%, #00aa88 100%);
            border-radius: 50%;
            margin: 0 auto 25px auto;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.6);
            animation: pulse 2s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 20px rgba(0, 255, 204, 0.4); }
            100% { transform: scale(1.05); box-shadow: 0 0 40px rgba(0, 255, 204, 0.8); }
        }

        .status-text {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .sub-text {
            color: #00ffcc;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .action-btn {
            background: #ffffff;
            color: #0b0e14;
            border: none;
            border-radius: 18px;
            padding: 18px 0;
            width: 100%;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 10px 25px rgba(255,255,255,0.1);
        }

        .action-btn:active {
            transform: scale(0.97);
            background: #e0e0e0;
        }

        .footer {
            color: #384357;
            font-size: 0.8rem;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>ZOZO</h1>
        <p>Mobile Node Platform</p>
    </div>

    <div class="main-container">
        <div class="status-card">
            <div class="pulse-orb" id="orb"></div>
            <div class="status-text" id="status-title">Система активна</div>
            <div class="sub-text" id="status-desc">Все модули работают стабильно</div>
        </div>

        <button class="action-btn" onclick="toggleStatus()">Управление</button>
    </div>

    <div class="footer">
        © 2026 ZOZO Inc. v1.0.0
    </div>

    <script>
        let isActive = true;
        
        function toggleStatus() {
            const orb = document.getElementById('orb');
            const title = document.getElementById('status-title');
            const desc = document.getElementById('status-desc');
            
            if(isActive) {
                orb.style.background = "radial-gradient(circle, #ff0055 0%, #aa0033 100%)";
                orb.style.boxShadow = "0 0 30px rgba(255, 0, 85, 0.6)";
                title.innerText = "Система приостановлена";
                desc.innerText = "Ожидание команды на запуск";
                desc.style.color = "#ff0055";
                isActive = false;
            } else {
                orb.style.background = "radial-gradient(circle, #00ffcc 0%, #00aa88 100%)";
                orb.style.boxShadow = "0 0 30px rgba(0, 255, 204, 0.6)";
                title.innerText = "Система активна";
                desc.innerText = "Все модули работают стабильно";
                desc.style.color = "#00ffcc";
                isActive = true;
            }
        }
    </script>
</body>
</html>
