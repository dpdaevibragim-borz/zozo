<!DOCTYPE html>
<html>
<head>
    <title>ZOZO Messenger</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #auth-screen, #chat-screen { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #0084ff; color: white; border: none; border-radius: 10px; cursor: pointer; margin-top: 5px; }
        #messages { height: 300px; overflow-y: scroll; border: 1px solid #eee; margin-bottom: 10px; padding: 10px; text-align: left; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <h3>ZOZO Messenger</h3>
        <input type="text" id="username" placeholder="Логин">
        <input type="password" id="password" placeholder="Пароль">
        <button onclick="register()">Регистрация</button>
        <button onclick="login()">Войти</button>
    </div>

    <div id="chat-screen" style="display:none;">
        <h3>Чат ZOZO</h3>
        <div id="messages"></div>
        <input type="text" id="msgInput" placeholder="Сообщение...">
        <button onclick="sendMessage()">Отправить</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, doc, setDoc, getDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAZE3nkVTy6KXKDuLBZ",
            authDomain: "zozo-messenger-e03b4.firebaseapp.com",
            projectId: "zozo-messenger-e03b4",
            storageBucket: "zozo-messenger-e03b4.appspot.com",
            messagingSenderId: "568360570286",
            appId: "1:568360570286:web:10fd8e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.register = async () => {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            await setDoc(doc(db, "users", user), { password: pass });
            alert("Успешно! Теперь нажмите Войти.");
        };

        window.login = async () => {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const docSnap = await getDoc(doc(db, "users", user));
            if (docSnap.exists() && docSnap.data().password === pass) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('chat-screen').style.display = 'block';
            } else {
                alert("Ошибка!");
            }
        };

        window.sendMessage = async () => {
            const text = document.getElementById('msgInput').value;
            await addDoc(collection(db, "messages"), { text: text, createdAt: new Date() });
            document.getElementById('msgInput').value = '';
        };

        onSnapshot(query(collection(db, "messages"), orderBy("createdAt")), (snap) => {
            const msgList = document.getElementById('messages');
            msgList.innerHTML = '';
            snap.forEach(d => {
                msgList.innerHTML += `<div>${d.data().text}</div>`;
            });
        });
    </script>
</body>
</html>
