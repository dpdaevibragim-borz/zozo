<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZOZO Node Messenger</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #131a2c;
            --accent-neon: #00ffcc;
            --accent-pink: #ff007f;
            --text-main: #ffffff;
            --text-muted: #6b7c96;
            --chat-bg: #0e1424;
        }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: sans-serif; margin: 0; }
        /* Стили для экрана пароля */
        #auth-screen { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 9999; background: #0b0f19; }
        .auth-card { width: 90%; max-width: 300px; padding: 20px; text-align: center; background: var(--card-bg); border-radius: 12px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--accent-neon); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h1>ZOZO</h1>
            <p id="label">Придумайте или введите пароль</p>
            <input type="password" id="pass" placeholder="Пароль">
            <button onclick="handleAuth()">Войти</button>
        </div>
    </div>

    <script>
        // ЛОГИКА ПАРОЛЯ
        const authScreen = document.getElementById('auth-screen');
        if (localStorage.getItem('userPassword')) {
            document.getElementById('label').innerText = "Введите пароль";
        }

        function handleAuth() {
            const pass = document.getElementById('pass').value;
            if (!pass) return alert("Введите пароль!");

            const saved = localStorage.getItem('userPassword');
            if (!saved) {
                localStorage.setItem('userPassword', pass);
                authScreen.style.display = 'none';
            } else if (pass === saved) {
                authScreen.style.display = 'none';
            } else {
                alert("Неверный пароль!");
            }
        }
    </script>

    </body>
</html>
